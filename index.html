<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG DATA | APRESENTAÇÃO </title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
                --bg-dark: #050005;
                --neon-purple: #b117b1;
                --neon-blue: #c172ff;
                --neon-green: #ff85d5;
                --neon-pink: #ffb5ff;
                --glass: rgba(255, 0, 255, 0.07);
                --border-glass: rgba(255, 0, 255, 0.3);
                --font-main: 'Fira Code', monospace;
                --font-tech: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: #fce7f3;
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- LOADER / TELA DE INICIALIZAÇÃO --- */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease-out, visibility 1s ease-out;
        }

        .loader-text {
            font-family: var(--font-tech);
            color: var(--neon-pink);
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: blink 0.5s infinite alternate;
        }

        .loader-bar-container {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .loader-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            animation: loadProgress 2.5s ease-in-out forwards;
        }

        @keyframes blink { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 10px var(--neon-pink); } }
        @keyframes loadProgress { 0% { width: 0%; } 40% { width: 30%; } 70% { width: 70%; } 100% { width: 100%; } }

        /* --- BACKGROUND: DATA RAIN CANVAS --- */
        #dataCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* --- SCANLINE & OVERLAYS --- */
        .scanline {
            width: 100%; height: 10px; z-index: 1000; pointer-events: none;
            background: linear-gradient(to bottom, transparent, var(--neon-pink), transparent);
            opacity: 0.1; position: fixed;
            animation: scanlineMove 6s linear infinite;
        }
        @keyframes scanlineMove { 0% { top: -10%; } 100% { top: 110%; } }

        /* --- HEADER ULTRA ANIMADO --- */
        header {
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a001a 0%, #000 100%);
        }

        .tech-grid-3d {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image:
                linear-gradient(transparent 0%, rgba(255, 0, 255, 0.2) 1px, transparent 2%),
                linear-gradient(90deg, transparent 0%, rgba(255, 45, 149, 0.1) 1px, transparent 2%);
            background-size: 80px 80px;
            transform: rotateX(75deg);
            animation: moveGrid 3s linear infinite;
            z-index: 1;
        }
        @keyframes moveGrid { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

        /* --- HUD ELEMENTS --- */
        .hud-element {
            position: absolute; padding: 15px; font-size: 0.65rem;
            color: var(--neon-blue); font-family: var(--font-tech);
            border: 1px solid var(--border-glass); background: rgba(0, 0, 0, 0.8);
            z-index: 15; text-transform: uppercase; letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }
        .top-left { top: 20px; left: 20px; border-left: 5px solid var(--neon-pink); }
        .top-right { top: 20px; right: 20px; border-right: 5px solid var(--neon-blue); text-align: right; }
        .bottom-left { bottom: 20px; left: 20px; border-bottom: 5px solid var(--neon-purple); }

        /* --- CENTRAL CONTENT --- */
        .header-content {
            z-index: 10; text-align: center;
            padding: 50px; border-radius: 20px;
        }

        .hero-title {
            font-family: var(--font-tech);
            font-size: clamp(3rem, 12vw, 6.5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-purple);
            letter-spacing: clamp(10px, 5vw, 25px);
